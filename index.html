<script>
// ═══════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════
const SUPA_URL = 'https://vuwgxndahrzinfdlapxz.supabase.co';
const SUPA_KEY = 'sb_publishable_n52t3_PPzeErFmL5eX07Cw_-qOkk-tH';

async function supa(method, table, opts = {}) {
  const { body, params, returning = false } = opts;
  let url = `${SUPA_URL}/rest/v1/${table}`;
  if (params) {
    const qs = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    url += '?' + qs;
  }
  const headers = {
    'apikey':        SUPA_KEY,
    'Authorization': `Bearer ${SUPA_KEY}`,
    'Content-Type':  'application/json',
    'Prefer':        returning ? 'return=representation' : 'return=minimal',
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase ${method} ${table}: ${err}`);
  }
  if (method === 'GET' || returning) return res.json();
  return true;
}

// Auth helpers
async function supaSignUp(email, password) {
  const res = await fetch(`${SUPA_URL}/auth/v1/signup`, {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  return res.json();
}

async function supaSignIn(email, password) {
  const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  return res.json();
}

async function supaSignOut(token) {
  await fetch(`${SUPA_URL}/auth/v1/logout`, {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
  });
}

function supaWithAuth(token) {
  return async function(method, table, opts = {}) {
    const { body, params, returning = false } = opts;
    let url = `${SUPA_URL}/rest/v1/${table}`;
    if (params) {
      const qs = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
      url += '?' + qs;
    }
    const headers = {
      'apikey':        SUPA_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type':  'application/json',
      'Prefer':        returning ? 'return=representation' : 'return=minimal',
    };
    const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`Supabase ${method} ${table}: ${err}`);
    }
    if (method === 'GET' || returning) return res.json();
    return true;
  };
}

<style>
/* ═══════════════════════════════════════════════════
   RESET & VARIABLES
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #F5F4F0;
  --surface:    #FFFFFF;
  --border:     #E2E0DA;
  --border-strong: #C8C5BC;
  --text:       #1A1916;
  --text-2:     #6B6860;
  --text-3:     #9E9C96;
  --accent:     #2B5CE6;
  --accent-lt:  #EEF2FD;
  --accent-2:   #E8430A;
  --green:      #1A8C5B;
  --green-lt:   #EDFAF3;
  --amber:      #C27B00;
  --amber-lt:   #FFF8E6;
  --red:        #C0392B;
  --red-lt:     #FDECEB;
  --purple:     #6B3FA0;
  --purple-lt:  #F3EDFB;
  --sidebar-w:  240px;
  --radius:     10px;
  --shadow:     0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:  0 8px 32px rgba(0,0,0,.10);
  --font:       'DM Sans', sans-serif;
  --mono:       'DM Mono', monospace;
  --transition: 180ms ease;
}

body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* ═══════════════════════════════════════════════════
   AUTH SCREENS
═══════════════════════════════════════════════════ */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 20%, rgba(43,92,230,.07) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(232,67,10,.05) 0%, transparent 50%);
}

.auth-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px;
  width: 420px;
  box-shadow: var(--shadow-lg);
}

.auth-logo {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--text);
  margin-bottom: 8px;
}
.auth-logo span { color: var(--accent); }

.auth-subtitle { color: var(--text-2); font-size: 13px; margin-bottom: 36px; }

.auth-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 28px;
}
.auth-tab {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: transparent;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: var(--transition);
}
.auth-tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: var(--transition);
}
.field input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(43,92,230,.1); }

.btn-primary {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 8px;
}
.btn-primary:hover { background: #1E46C4; }

/* ═══════════════════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════════════════ */
#app { display: none; min-height: 100vh; }
#app.visible { display: flex; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
}

.sidebar-brand {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.brand-icon svg { width: 16px; height: 16px; fill: #fff; }
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }

.tenant-badge {
  margin: 12px 16px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.tenant-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tenant-plan { font-size: 11px; color: var(--text-3); }

.sidebar-nav { flex: 1; padding: 8px 12px; }
.nav-section { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .08em; padding: 12px 8px 4px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  color: var(--text-2);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 2px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--accent-lt); color: var(--accent); }
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.user-info { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 500; }
.user-role { font-size: 11px; color: var(--text-3); }
.btn-logout {
  margin-left: auto;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: none;
  font-size: 11px;
  color: var(--text-2);
  cursor: pointer;
  font-family: var(--font);
  transition: var(--transition);
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* MAIN */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.page-title { font-size: 16px; font-weight: 600; letter-spacing: -.2px; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: none;
}
.btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--border-strong); background: var(--bg); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #1E46C4; }
.btn-ghost { background: none; color: var(--text-2); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-danger { background: var(--red-lt); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn svg { width: 14px; height: 14px; }

.content { padding: 28px; flex: 1; }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
}
.kpi-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 600; letter-spacing: -1px; color: var(--text); }
.kpi-sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }
.kpi-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

/* STATUS BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-confirmado  { background: var(--green-lt);  color: var(--green); }
.badge-pendente    { background: var(--amber-lt);  color: var(--amber); }
.badge-solicitado  { background: var(--accent-lt); color: var(--accent); }
.badge-concluido   { background: var(--bg);        color: var(--text-3); }
.badge-cancelado   { background: var(--red-lt);    color: var(--red); }
.badge-noshow      { background: var(--purple-lt); color: var(--purple); }

/* TABLES */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
tbody tr { border-bottom: 1px solid var(--border); transition: var(--transition); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
tbody td { padding: 12px 14px; font-size: 13.5px; }

/* AGENDA DO DIA */
.day-slots { display: flex; flex-direction: column; gap: 4px; }
.time-slot {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 12px;
  align-items: center;
  min-height: 48px;
}
.slot-time { font-size: 12px; font-weight: 500; color: var(--text-3); font-family: var(--mono); text-align: right; padding-right: 8px; }
.slot-event {
  background: var(--accent-lt);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  cursor: pointer;
  transition: var(--transition);
}
.slot-event:hover { transform: translateX(2px); box-shadow: var(--shadow); }
.slot-event.verde { background: var(--green-lt); border-color: var(--green); }
.slot-event.amber { background: var(--amber-lt); border-color: var(--amber); }
.slot-event.vazio { background: transparent; border-color: transparent; }
.slot-event-name { font-size: 13px; font-weight: 600; }
.slot-event-meta { font-size: 12px; color: var(--text-2); }
.slot-empty { color: var(--border-strong); font-size: 12px; padding: 8px 0; }

/* CALENDÁRIO */
.cal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.cal-nav { display: flex; gap: 4px; }
.cal-nav button {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  font-size: 13px;
  color: var(--text-2);
  transition: var(--transition);
}
.cal-nav button:hover { background: var(--bg); }
.cal-title { font-size: 16px; font-weight: 600; }
.cal-views { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 3px; }
.cal-view-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: none;
  background: none;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: var(--transition);
}
.cal-view-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

.cal-week-grid {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.cal-week-header { display: contents; }
.cal-wh-empty { background: var(--bg); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.cal-wh-day {
  background: var(--bg);
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
}
.cal-wh-day.today { color: var(--accent); }
.cal-wh-date { font-size: 18px; font-weight: 700; color: var(--text); }
.cal-wh-date.today { background: var(--accent); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 2px auto 0; }

.cal-time-col { border-right: 1px solid var(--border); }
.cal-time-cell {
  height: 56px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 4px 8px 0;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
}
.cal-day-col { border-right: 1px solid var(--border); position: relative; }
.cal-day-col:last-child { border-right: none; }
.cal-hour-cell { height: 56px; border-bottom: 1px solid var(--border); position: relative; }
.cal-hour-cell:last-child { border-bottom: none; }
.cal-appt {
  position: absolute;
  left: 3px; right: 3px;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  overflow: hidden;
  z-index: 2;
  transition: var(--transition);
}
.cal-appt:hover { filter: brightness(0.95); transform: scale(1.01); }
.cal-appt.azul { background: var(--accent-lt); color: var(--accent); border-left: 3px solid var(--accent); }
.cal-appt.verde { background: var(--green-lt); color: var(--green); border-left: 3px solid var(--green); }
.cal-appt.amber { background: var(--amber-lt); color: var(--amber); border-left: 3px solid var(--amber); }

/* MONTH VIEW */
.cal-month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.cal-month-dow {
  background: var(--bg);
  padding: 8px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .05em;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.cal-month-dow:last-child { border-right: none; }
.cal-month-cell {
  min-height: 100px;
  padding: 8px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  vertical-align: top;
}
.cal-month-cell:nth-child(7n) { border-right: none; }
.cal-month-day { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 4px; }
.cal-month-day.today { color: var(--accent); }
.cal-month-dot { font-size: 11px; background: var(--accent-lt); color: var(--accent); padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.cal-month-dot.verde { background: var(--green-lt); color: var(--green); }
.cal-month-dot.amber { background: var(--amber-lt); color: var(--amber); }
.cal-month-more { font-size: 11px; color: var(--text-3); cursor: pointer; }
.cal-month-empty { background: var(--bg); opacity: .5; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: 14px;
  width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(8px);
  transition: transform 200ms;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: 20px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none;
  background: var(--bg);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-2);
  transition: var(--transition);
}
.modal-close:hover { background: var(--border); }
.modal-body { padding: 0 24px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* FORM GRID */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text-2); }
.form-input, .form-select, .form-textarea {
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 13.5px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(43,92,230,.1);
}
.form-textarea { resize: vertical; min-height: 80px; }

/* SEARCH BAR */
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  width: 240px;
}

}

.toast {

  color: #fff;
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: slideUp .2s ease;
  display: flex; align-items: center; gap: 10px;
}
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }
@keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* DETAIL PANEL */
.detail-panel {
  position: fixed;
  top: 0; right: 0;
  width: 380px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  z-index: 150;
  transform: translateX(100%);
  transition: transform 250ms ease;
  display: flex; flex-direction: column;
}
.detail-panel.open { transform: translateX(0); }
.detail-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

.gap-8 { gap: 8px; }

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('tab-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.querySelector('#tab-login .btn-primary');
  btn.textContent = 'Entrando...'; btn.disabled = true;
  try {
    const res = await supaSignIn(email, pass);
    if (res.error) { toast('E-mail ou senha incorretos.', 'error'); return; }
    APP.authToken = res.access_token;
    APP.authUser  = res.user;
    APP.db = supaWithAuth(res.access_token);
    // Salvar sessão
    localStorage.setItem('agenda_token', res.access_token);
    localStorage.setItem('agenda_user_email', email);
    await carregarDadosUsuario(res.user.id, email);
  } catch(e) {
    toast('Erro ao conectar: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Entrar'; btn.disabled = false;
  }
}

async function carregarDadosUsuario(authId, email) {
  try {
    // Buscar usuário interno
    const users = await APP.db('GET', 'agenda_usuarios', {
      params: { 'auth_id': `eq.${authId}`, 'select': '*' }
    });
    if (!users || users.length === 0) {
      toast('Usuário não encontrado no sistema. Contate o administrador.', 'error');
      return;
    }
    APP.user = users[0];
    APP.tenantId = users[0].tenant_id;
    await carregarTodosDados();
    showApp();
  } catch(e) {
    toast('Erro ao carregar dados: ' + e.message, 'error');
  }
}

async function carregarTodosDados() {
  const tid = APP.tenantId;
  const db  = APP.db;
  try {
    const [clientes, servicos, usuarios, agendamentos, disponibilidade, bloqueios, config, tenants] = await Promise.all([
      db('GET', 'agenda_clientes',       { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*' } }),
      db('GET', 'agenda_servicos',       { params: { tenant_id: `eq.${tid}`, select: '*' } }),
      db('GET', 'agenda_usuarios',       { params: { tenant_id: `eq.${tid}`, ativo: 'eq.true', select: '*' } }),
      db('GET', 'agenda_agendamentos',   { params: { tenant_id: `eq.${tid}`, select: '*', order: 'data_inicio.desc', limit: 200 } }),
      db('GET', 'agenda_disponibilidade',{ params: { tenant_id: `eq.${tid}`, select: '*' } }),
      db('GET', 'agenda_bloqueios',      { params: { tenant_id: `eq.${tid}`, select: '*', order: 'data_inicio.asc' } }),
      db('GET', 'agenda_config',         { params: { tenant_id: `eq.${tid}`, select: '*' } }),
      db('GET', 'agenda_tenants',        { params: { id: `eq.${tid}`, select: '*' } }),
    ]);
    // Mapear para arrays globais usados pelo app
    CLIENTES.length       = 0; clientes.forEach(x => CLIENTES.push(x));
    SERVICOS.length       = 0; servicos.forEach(x => SERVICOS.push(x));
    USUARIOS.length       = 0; usuarios.forEach(x => USUARIOS.push(x));
    AGENDAMENTOS.length   = 0; agendamentos.forEach(x => AGENDAMENTOS.push(x));
    DISPONIBILIDADE.length= 0; disponibilidade.forEach(x => DISPONIBILIDADE.push(x));
    BLOQUEIOS.length      = 0; bloqueios.forEach(x => BLOQUEIOS.push(x));
    CONFIG.length         = 0; config.forEach(x => CONFIG.push(x));
    if (tenants && tenants[0]) { TENANT.id = tenants[0].id; TENANT.nome = tenants[0].nome; TENANT.plano = tenants[0].plano; }
  } catch(e) {
    toast('Erro ao carregar dados do servidor: ' + e.message, 'error');
  }
}

async function doRegister() {
  const nome   = document.getElementById('reg-name').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const pass   = document.getElementById('reg-pass').value;
  const office = document.getElementById('reg-office').value.trim();
  if (!nome || !email || !pass || !office) { toast('Preencha todos os campos.', 'error'); return; }
  if (pass.length < 6) { toast('Senha deve ter ao menos 6 caracteres.', 'error'); return; }
  const btn = document.querySelector('#tab-register .btn-primary');
  btn.textContent = 'Criando conta...'; btn.disabled = true;
  try {
    // 1. Criar usuário no Auth
    const authRes = await supaSignUp(email, pass);
    if (authRes.error) { toast('Erro: ' + authRes.error.message, 'error'); return; }
    const authId = authRes.user?.id;
    if (!authId) { toast('Erro ao criar conta. Tente novamente.', 'error'); return; }

    // 2. Criar tenant via service (usa anon key — RLS permite INSERT em tenants sem auth para self-service)
    const tenantRes = await fetch(`${SUPA_URL}/rest/v1/agenda_tenants`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ nome: office, plano: 'starter' })
    });
    const tenants = await tenantRes.json();
    const tenantId = tenants[0]?.id;
    if (!tenantId) { toast('Erro ao criar escritório.', 'error'); return; }

    // 3. Criar usuário interno
    await fetch(`${SUPA_URL}/rest/v1/agenda_usuarios`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ tenant_id: tenantId, auth_id: authId, nome, email, perfil: 'admin', ativo: true })
    });

    // 4. Config padrão
    const cfgBase = [
      { tenant_id: tenantId, chave: 'antecedencia_minima_min',   valor: '60',     descricao: 'Antecedência mínima (min)',  categoria: 'operacional' },
      { tenant_id: tenantId, chave: 'tolerancia_atraso_min',     valor: '15',     descricao: 'Tolerância no-show (min)',   categoria: 'operacional' },
      { tenant_id: tenantId, chave: 'confirmacao_automatica',    valor: 'false',  descricao: 'Confirmação automática',     categoria: 'operacional' },
      { tenant_id: tenantId, chave: 'fuso_horario',              valor: 'America/Sao_Paulo', descricao: 'Fuso horário',   categoria: 'operacional' },
      { tenant_id: tenantId, chave: 'nome_escritorio',           valor: office,   descricao: 'Nome do escritório',         categoria: 'aparencia'   },
    ];
    await fetch(`${SUPA_URL}/rest/v1/agenda_config`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(cfgBase)
    });

    toast('Conta criada! Faça login para continuar.', 'success');
    switchAuthTab('login');
    document.getElementById('login-email').value = email;
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Criar conta gratuita'; btn.disabled = false;
  }
}

async function doLogout() {
  if (APP.authToken) await supaSignOut(APP.authToken).catch(()=>{});
  localStorage.removeItem('agenda_token');
  localStorage.removeItem('agenda_user_email');
  APP.user = null; APP.authToken = null; APP.db = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.classList.add('visible');
  document.getElementById('sidebar-tenant').textContent = TENANT.nome;
  document.getElementById('sidebar-user').textContent   = APP.user.nome;
  document.getElementById('sidebar-role').textContent   = { admin:'Administrador', gerente:'Gerente', colaborador:'Colaborador', visualizador:'Visualizador' }[APP.user.perfil] || APP.user.perfil;
  document.getElementById('sidebar-avatar').textContent = APP.user.nome[0].toUpperCase();
  go('dashboard');
}

// Tentar restaurar sessão salva
async function tentarRestaurarSessao() {
  const token = localStorage.getItem('agenda_token');
  if (!token) return;
  try {
    const res = await fetch(`${SUPA_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) { localStorage.removeItem('agenda_token'); return; }
    const user = await res.json();
    APP.authToken = token;
    APP.authUser  = user;
    APP.db = supaWithAuth(token);
    await carregarDadosUsuario(user.id, user.email);
  } catch(e) {
    localStorage.removeItem('agenda_token');
  }
}

function statusBadge(st) {
  const map = {
    solicitado:            ['badge-solicitado',  'Solicitado'],
    pendente_confirmacao:  ['badge-pendente',    'Pendente'],
    confirmado:            ['badge-confirmado',  'Confirmado'],
    concluido:             ['badge-concluido',   'Concluído'],
    cancelado_cliente:     ['badge-cancelado',   'Cancelado'],
    cancelado_escritorio:  ['badge-cancelado',   'Cancelado'],
    nao_compareceu:        ['badge-noshow',      'Não compareceu'],
    reagendado:            ['badge-concluido',   'Reagendado'],
  };
  const [cls, label] = map[st] || ['badge-pendente', st];
  return `<span class="badge ${cls}">${label}</span>`;
}

function origemIcon(o) {
  const icons = { interno: '🏢', link_publico: '🔗', whatsapp: '💬', importado: '📥' };
  return icons[o] || '—';
}

  const hours = ['08:00','09:00','10:00','10:30','11:00','12:00','13:00','14:00','15:00','15:30','16:00','17:00','18:00'];
  const agByTime = {};
  horasOrdenadas.forEach(a => {
    const t = fmtTime(a.data_inicio);
    agByTime[t] = a;
  });

  hours.forEach(t => {
    const a = agByTime[t];
    const div = document.createElement('div');
    div.className = 'time-slot';
    if (a) {
      const cls = a.status === 'confirmado' ? 'verde' : a.status === 'pendente_confirmacao' ? 'amber' : '';
      div.innerHTML = `
        <div class="slot-time">${t}</div>
        <div class="slot-event ${cls}" onclick="openDetail(${a.id})">
          <div class="slot-event-name">${getCliente(a.cliente_id).nome}</div>
          <div class="slot-event-meta">${getServico(a.servico_id).nome} · ${getUsuario(a.usuario_responsavel_id).nome.split(' ')[0]} · ${statusBadge(a.status)}</div>
        </div>`;
    } else {
      div.innerHTML = `<div class="slot-time">${t}</div><div class="slot-empty slot-event vazio">—</div>`;
    }
    slots.appendChild(div);
  });
}

function renderAgenda() {
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = `
    <div class="cal-views">
      <button class="cal-view-btn ${APP.calView==='dia'?'active':''}" onclick="setCalView('dia')">Dia</button>
      <button class="cal-view-btn ${APP.calView==='semana'?'active':''}" onclick="setCalView('semana')">Semana</button>
      <button class="cal-view-btn ${APP.calView==='mes'?'active':''}" onclick="setCalView('mes')">Mês</button>
    </div>
    <button class="btn btn-accent btn-sm" onclick="openNovoAgendamento()">+ Novo agendamento</button>
  `;

  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="card">
      <div class="cal-header">
        <div class="cal-nav">
          <button onclick="calNav(-1)">‹</button>
          <button onclick="calNav(0)">Hoje</button>
          <button onclick="calNav(1)">›</button>
        </div>
        <span class="cal-title" id="cal-title-text"></span>
      </div>
      <div id="cal-body"></div>
    </div>`;

  renderCalBody();
}

function setCalView(v) {
  APP.calView = v;
  renderAgenda();
}

function calNav(dir) {
  if (dir === 0) { APP.calDate = new Date(TODAY); }
  else if (APP.calView === 'dia')    { APP.calDate.setDate(APP.calDate.getDate() + dir); }
  else if (APP.calView === 'semana') { APP.calDate.setDate(APP.calDate.getDate() + dir * 7); }
  else if (APP.calView === 'mes')    { APP.calDate.setMonth(APP.calDate.getMonth() + dir); }
  renderCalBody();
}

function renderCalBody() {
  if (APP.calView === 'semana') renderWeekView();
  else if (APP.calView === 'dia') renderDayView();
  else renderMonthView();
}

function renderWeekView() {
  const start = new Date(APP.calDate);
  start.setDate(start.getDate() - start.getDay()); // domingo
  const days = Array.from({length:7}, (_,i) => { const d = new Date(start); d.setDate(d.getDate()+i); return d; });

  document.getElementById('cal-title-text').textContent =
    `${days[0].toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}`;

  const HOURS = Array.from({length:11}, (_,i) => i + 8); // 8h–18h

  let html = `<div class="cal-week-grid">`;
  // Header
  html += `<div class="cal-wh-empty" style="background:var(--bg);border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:10px 4px"></div>`;
  days.forEach(d => {
    const isToday = d.toDateString() === TODAY.toDateString();
    const dow = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()];
    html += `<div class="cal-wh-day${isToday?' today':''}">
      <div>${dow}</div>
      <div class="cal-wh-date${isToday?' today':''}">${d.getDate()}</div>
    </div>`;
  });

  // Rows
  HOURS.forEach(h => {
    html += `<div class="cal-time-col"><div class="cal-time-cell">${String(h).padStart(2,'0')}:00</div></div>`;
    days.forEach(d => {
      const dateStr = d.toISOString().slice(0,10);
      const ags = AGENDAMENTOS.filter(a => {
        const aDate = a.data_inicio.slice(0,10);
        const aHour = parseInt(a.data_inicio.slice(11,13));
        return aDate === dateStr && aHour === h && !['cancelado_cliente','cancelado_escritorio'].includes(a.status);
      });
      html += `<div class="cal-day-col"><div class="cal-hour-cell">`;
      ags.forEach(a => {
        const srv = getServico(a.servico_id);
        const cls = a.status==='confirmado'?'verde':a.status==='pendente_confirmacao'?'amber':'azul';
        const durSlots = Math.max(1, Math.round(srv.duracao_min / 56 * 56));
        html += `<div class="cal-appt ${cls}" style="top:2px;height:${Math.min(durSlots,52)}px" onclick="openDetail(${a.id})">
          ${getCliente(a.cliente_id).nome.split(' ')[0]}<br><span style="font-weight:400;font-size:10px">${srv.nome}</span>
        </div>`;
      });
      html += `</div></div>`;
    });
  });
  html += `</div>`;
  document.getElementById('cal-body').innerHTML = html;
}

function renderDayView() {
  const d = APP.calDate;
  const dateStr = d.toISOString().slice(0,10);
  document.getElementById('cal-title-text').textContent = d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const HOURS = Array.from({length:11}, (_,i) => i + 8);
  const ags = AGENDAMENTOS.filter(a => a.data_inicio.startsWith(dateStr));

  let html = `<div class="day-slots">`;
  HOURS.forEach(h => {
    const hStr = String(h).padStart(2,'0') + ':00';
    const match = ags.filter(a => parseInt(a.data_inicio.slice(11,13)) === h);
    if (match.length) {
      match.forEach(a => {
        const cls = a.status==='confirmado'?'verde':a.status==='pendente_confirmacao'?'amber':'';
        html += `<div class="time-slot">
          <div class="slot-time">${fmtTime(a.data_inicio)}</div>
          <div class="slot-event ${cls}" onclick="openDetail(${a.id})">
            <div class="slot-event-name">${getCliente(a.cliente_id).nome}</div>
            <div class="slot-event-meta">${getServico(a.servico_id).nome} · ${getUsuario(a.usuario_responsavel_id).nome} · ${statusBadge(a.status)}</div>
          </div>
        </div>`;
      });
    } else {
      html += `<div class="time-slot"><div class="slot-time">${hStr}</div><div class="slot-empty slot-event vazio">—</div></div>`;
    }
  });
  html += `</div>`;
  document.getElementById('cal-body').innerHTML = html;
}

function renderMonthView() {
  const year  = APP.calDate.getFullYear();
  const month = APP.calDate.getMonth();
  document.getElementById('cal-title-text').textContent =
    new Date(year, month, 1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const DOWS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let html = `<div class="cal-month-grid">`;
  DOWS.forEach(d => html += `<div class="cal-month-dow">${d}</div>`);

  // Empty cells
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-month-cell cal-month-empty"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const dayAgs = AGENDAMENTOS.filter(a => a.data_inicio.startsWith(dateStr) && !['cancelado_cliente','cancelado_escritorio'].includes(a.status));
    const show = dayAgs.slice(0,2);
    const more = dayAgs.length - 2;
    html += `<div class="cal-month-cell">
      <div class="cal-month-day${isToday?' today':''}">${day}</div>
      ${show.map(a => {
        const cls = a.status==='confirmado'?'verde':a.status==='pendente_confirmacao'?'amber':'';
        return `<div class="cal-month-dot ${cls}" onclick="openDetail(${a.id})">${fmtTime(a.data_inicio)} ${getCliente(a.cliente_id).nome.split(' ')[0]}</div>`;
      }).join('')}
      ${more > 0 ? `<div class="cal-month-more">+${more} mais</div>` : ''}
    </div>`;
  }

  const remaining = (7 - (firstDay + daysInMonth) % 7) % 7;
  for (let i = 0; i < remaining; i++) html += `<div class="cal-month-cell cal-month-empty"></div>`;
  html += `</div>`;
  document.getElementById('cal-body').innerHTML = html;
}

function maskDoc(doc) {
  if (!doc) return '—';
  const d = doc.replace(/\D/g,'');
  if (d.length === 11) return `***.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
  return `**.${d.slice(2,5)}.${d.slice(5,8)}/****-${d.slice(12)}`;
}

function filterClientes(v) {
  APP.clientSearch = v;
  renderClientes();
}

  const sv = getServico(a.servico_id);

  document.getElementById('detail-title').textContent = 'Agendamento #' + a.id;
  document.getElementById('detail-body').innerHTML = `

      <div style="font-size:15px;font-weight:600">${sv.nome}</div>
      <div style="font-size:13px;color:var(--text-2)">${fmtDateTime(a.data_inicio)} → ${fmtTime(a.data_fim)}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Status</div>
      <div class="detail-value">${statusBadge(a.status)}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Cliente</div>
      <div class="detail-value"><strong>${cl.nome}</strong><br><span class="text-muted">${cl.email} · ${cl.telefone}</span></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Responsável</div>
      <div class="detail-value">${us.nome}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Origem</div>
      <div class="detail-value">${origemIcon(a.origem_agendamento)} ${a.origem_agendamento}</div>
    </div>
    ${a.observacao_interna ? `<div class="detail-row">
      <div class="detail-label">Obs. Interna</div>
      <div class="detail-value" style="background:var(--amber-lt);padding:8px;border-radius:6px;font-size:13px">${a.observacao_interna}</div>
    </div>` : ''}
    ${a.confirmado_em ? `<div class="detail-row">
      <div class="detail-label">Confirmado em</div>
      <div class="detail-value text-muted">${fmtDateTime(a.confirmado_em)}</div>
    </div>` : ''}
    ${a.motivo_cancelamento ? `<div class="detail-row">
      <div class="detail-label">Motivo Cancelamento</div>
      <div class="detail-value">${a.motivo_cancelamento}</div>
    </div>` : ''}
    <hr class="separator">
    <div class="detail-label">Histórico de status</div>
    <div style="margin-top:8px;font-size:13px;color:var(--text-2)">Disponível na v1.1 (log de alterações)</div>
  `;

  const footer = document.getElementById('detail-footer');
  footer.innerHTML = '';

  if (['solicitado','pendente_confirmacao'].includes(a.status)) {
    footer.innerHTML += `<button class="btn btn-outline btn-sm" style="color:var(--green);border-color:var(--green)" onclick="confirmarAg(${a.id})">✓ Confirmar</button>`;
  }
  if (a.status === 'confirmado') {
    footer.innerHTML += `<button class="btn btn-outline btn-sm" style="color:var(--green);border-color:var(--green)" onclick="concluirAg(${a.id})">✓ Concluído</button>`;
    footer.innerHTML += `<button class="btn btn-outline btn-sm" style="color:var(--purple);border-color:var(--purple)" onclick="noShowAg(${a.id})">Não compareceu</button>`;
  }
  if (!['concluido','cancelado_cliente','cancelado_escritorio','nao_compareceu'].includes(a.status)) {
    footer.innerHTML += `<button class="btn btn-danger btn-sm" onclick="cancelarAg(${a.id})">Cancelar</button>`;
  }

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

async function atualizarStatusAg(id, novoStatus, extra = {}) {
  const a = AGENDAMENTOS.find(x => x.id === id);
  if (!a) return;
  const patch = { status: novoStatus, atualizado_por: APP.user.id, ...extra };
  try {
    await APP.db('PATCH', 'agenda_agendamentos', {
      params: { id: `eq.${id}`, tenant_id: `eq.${APP.tenantId}` },
      body: patch
    });
    Object.assign(a, patch);
  } catch(e) {
    toast('Erro ao atualizar: ' + e.message, 'error');
    return false;
  }
  return true;
}

async function confirmarAg(id) {
  if (await atualizarStatusAg(id, 'confirmado', { confirmado_em: new Date().toISOString() })) {
    toast('Agendamento confirmado!', 'success');
    closeDetail(); go(APP.page);
  }
}

async function concluirAg(id) {
  if (await atualizarStatusAg(id, 'concluido')) {
    toast('Agendamento concluído!', 'success');
    closeDetail(); go(APP.page);
  }
}

async function noShowAg(id) {
  const a = AGENDAMENTOS.find(x=>x.id===id);
  if (!a) return;
  if (await atualizarStatusAg(id, 'nao_compareceu')) {
    // O trigger do Supabase atualiza o score — recarregar cliente
    try {
      const cli = await APP.db('GET', 'agenda_clientes', {
        params: { id: `eq.${a.cliente_id}`, tenant_id: `eq.${APP.tenantId}`, select: 'id,noshow_count,score' }
      });
      if (cli && cli[0]) {
        const c = CLIENTES.find(x => x.id === a.cliente_id);
        if (c) { c.noshow_count = cli[0].noshow_count; c.score = cli[0].score; }
      }
    } catch(e) {}
    toast('Registrado: não compareceu. Score atualizado pelo servidor.', 'error');
    closeDetail(); go(APP.page);
  }
}

async function cancelarAg(id) {
  const motivo = prompt('Motivo do cancelamento (opcional):') || '';
  if (await atualizarStatusAg(id, 'cancelado_escritorio', {
    cancelado_em: new Date().toISOString(),
    motivo_cancelamento: motivo
  })) {
    toast('Agendamento cancelado.', 'error');
    closeDetail(); go(APP.page);
  }
}

function salvarNovoAgendamento() {
  const clienteId = parseInt(document.getElementById('nag-cliente').value);
  const servicoId = parseInt(document.getElementById('nag-servico').value);
  const data      = document.getElementById('nag-data').value;
  const hora      = document.getElementById('nag-hora').value;
  const respId    = parseInt(document.getElementById('nag-resp').value);
  const obs       = document.getElementById('nag-obs').value;

  if (!clienteId || !servicoId || !data || !hora) {
    toast('Preencha todos os campos obrigatórios.', 'error');
    return;
  }
  const sv = getServico(servicoId);
  const inicio = `${data}T${hora}:00`;
  const fimDate = new Date(inicio);
  fimDate.setMinutes(fimDate.getMinutes() + sv.duracao_min);
  const fim = fimDate.toISOString().slice(0,16) + ':00';

  // Verificar conflito simples
  const conflito = AGENDAMENTOS.find(a =>
    a.usuario_responsavel_id === respId &&
    !['cancelado_cliente','cancelado_escritorio'].includes(a.status) &&
    a.data_inicio < fim && a.data_fim > inicio
  );
  if (conflito) {
    toast('Conflito de horário com outro agendamento!', 'error');
    return;
  }

  const novoAg = {
    tenant_id: APP.tenantId,
    cliente_id: clienteId,
    servico_id: servicoId,
    usuario_responsavel_id: respId,
    data_inicio: inicio,
    data_fim: fim,
    status: 'confirmado',
    origem_agendamento: 'interno',
    observacao_interna: obs,
    observacao_cliente: '',
    confirmado_em: new Date().toISOString(),
    criado_por: APP.user.id,
    atualizado_por: APP.user.id
  };

  try {
    const criado = await APP.db('POST', 'agenda_agendamentos', { body: novoAg, returning: true });
    if (criado && criado[0]) AGENDAMENTOS.unshift(criado[0]);
    closeModal();
    toast('Agendamento criado com sucesso!', 'success');
    go(APP.page);
  } catch(e) {
    toast('Erro ao salvar: ' + e.message, 'error');
  }
}

function toast(msg, type = '') {

const DIAS_SEMANA = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const DIAS_SHORT  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function renderDisponibilidade() {
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = `<button class="btn btn-accent btn-sm" onclick="openNovaDisponibilidade()">+ Adicionar horário</button>`;

  const colabs = USUARIOS.filter(u => u.ativo && u.perfil !== 'visualizador');

  let html = ``;
  colabs.forEach(u => {
    const disps = DISPONIBILIDADE.filter(d => d.usuario_id === u.id).sort((a,b) => a.dia_semana - b.dia_semana);

    // Grade visual 7 dias
    let grade = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:14px 0">`;
    for (let dia = 0; dia < 7; dia++) {
      const d = disps.find(x => x.dia_semana === dia && x.ativo);
      const isWeekend = dia === 0 || dia === 6;
      grade += `<div style="border-radius:8px;border:1px solid var(--border);padding:10px 6px;text-align:center;background:${d ? 'var(--accent-lt)' : isWeekend ? 'var(--bg)' : 'var(--surface)'}">
        <div style="font-size:11px;font-weight:600;color:${d ? 'var(--accent)' : 'var(--text-3)'};margin-bottom:4px">${DIAS_SHORT[dia]}</div>
        ${d
          ? `<div style="font-size:12px;font-weight:600;color:var(--accent)">${d.hora_inicio}</div><div style="font-size:10px;color:var(--text-3)">até</div><div style="font-size:12px;font-weight:600;color:var(--accent)">${d.hora_fim}</div>`
          : `<div style="font-size:11px;color:var(--text-3)">—</div>`
        }
      </div>`;
    }
    grade += `</div>`;

    // Tabela de registros
    let rows = disps.map(d => `
      <tr>
        <td><strong>${DIAS_SEMANA[d.dia_semana]}</strong></td>
        <td><span style="font-family:var(--mono)">${d.hora_inicio}</span></td>
        <td><span style="font-family:var(--mono)">${d.hora_fim}</span></td>
        <td>${calcHoras(d.hora_inicio, d.hora_fim)}h trabalhadas</td>
        <td><span class="badge ${d.ativo ? 'badge-confirmado' : 'badge-cancelado'}">${d.ativo ? 'Ativo' : 'Inativo'}</span></td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="editDisponibilidade(${d.id})">Editar</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleDisponibilidade(${d.id})" style="color:${d.ativo ? 'var(--red)' : 'var(--green)'}">${d.ativo ? 'Desativar' : 'Ativar'}</button>
          <button class="btn btn-ghost btn-sm" onclick="removerDisponibilidade(${d.id})" style="color:var(--red)">Remover</button>
        </td>
      </tr>`).join('');

    html += `<div class="card mb-20">
      <div class="flex-between mb-16">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar-sm" style="background:var(--accent)">${u.nome[0]}</div>
          <div>
            <strong style="font-size:15px">${u.nome}</strong>
            <div class="text-muted">${{admin:'Administrador',gerente:'Gerente',colaborador:'Colaborador'}[u.perfil]}</div>
          </div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="openNovaDisponibilidade(${u.id})">+ Horário para este colaborador</button>
      </div>
      ${grade}
      ${disps.length > 0 ? `<div class="table-wrap"><table>
        <thead><tr><th>Dia</th><th>Início</th><th>Fim</th><th>Carga</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>` : '<div class="text-muted" style="padding:12px 0">Nenhum horário cadastrado.</div>'}
    </div>`;
  });

  document.getElementById('page-content').innerHTML = html;
}

function calcHoras(ini, fim) {
  const [ih, im] = ini.split(':').map(Number);
  const [fh, fm] = fim.split(':').map(Number);
  return ((fh * 60 + fm - ih * 60 - im) / 60).toFixed(1);
}

function openNovaDisponibilidade(preUsuario = null) {
  document.getElementById('modal-title').textContent = 'Adicionar Horário de Atendimento';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-field full">
        <label class="form-label">Colaborador</label>
        <select class="form-select" id="nd-usuario">
          ${USUARIOS.filter(u=>u.ativo && u.perfil !== 'visualizador').map(u =>
            `<option value="${u.id}" ${preUsuario == u.id ? 'selected' : ''}>${u.nome}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-field full">
        <label class="form-label">Dia(s) da semana</label>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:4px" id="nd-dias">
          ${DIAS_SHORT.map((d,i) => `
            <label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer">
              <input type="checkbox" value="${i}" style="margin:0" ${i>=1&&i<=5?'checked':''}>
              <span style="font-size:12px;font-weight:500">${d}</span>
            </label>`).join('')}
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Hora início</label>
        <input type="time" class="form-input" id="nd-ini" value="08:00">
      </div>
      <div class="form-field">
        <label class="form-label">Hora fim</label>
        <input type="time" class="form-input" id="nd-fim" value="17:00">
      </div>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-accent" onclick="salvarDisponibilidade()">Salvar</button>`;
  openModal();
}

function salvarDisponibilidade() {
  const uid  = parseInt(document.getElementById('nd-usuario').value);
  const ini  = document.getElementById('nd-ini').value;
  const fim  = document.getElementById('nd-fim').value;
  const dias = [...document.querySelectorAll('#nd-dias input:checked')].map(x => parseInt(x.value));
  if (!dias.length) { toast('Selecione ao menos um dia.', 'error'); return; }
  if (ini >= fim)   { toast('Hora fim deve ser maior que hora início.', 'error'); return; }
  dias.forEach(dia => {
    // Remove existente no mesmo dia/usuario para evitar duplicata
    const idx = DISPONIBILIDADE.findIndex(d => d.usuario_id === uid && d.dia_semana === dia);
    if (idx >= 0) DISPONIBILIDADE.splice(idx, 1);
    DISPONIBILIDADE.push({ id: ++nextId, tenant_id: 1, usuario_id: uid, dia_semana: dia, hora_inicio: ini, hora_fim: fim, ativo: true });
  });
  closeModal();
  toast(`${dias.length} horário(s) salvo(s)!`, 'success');
  go('disponibilidade');
}

function editDisponibilidade(id) {
  const d = DISPONIBILIDADE.find(x => x.id === id);
  if (!d) return;
  document.getElementById('modal-title').textContent = `Editar — ${DIAS_SEMANA[d.dia_semana]}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label">Hora início</label>
        <input type="time" class="form-input" id="ed-ini" value="${d.hora_inicio}">
      </div>
      <div class="form-field">
        <label class="form-label">Hora fim</label>
        <input type="time" class="form-input" id="ed-fim" value="${d.hora_fim}">
      </div>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-accent" onclick="salvarEditDisponibilidade(${id})">Salvar</button>`;
  openModal();
}

function salvarEditDisponibilidade(id) {
  const d = DISPONIBILIDADE.find(x => x.id === id);
  if (!d) return;
  const ini = document.getElementById('ed-ini').value;
  const fim = document.getElementById('ed-fim').value;
  if (ini >= fim) { toast('Hora fim deve ser maior que hora início.', 'error'); return; }
  d.hora_inicio = ini; d.hora_fim = fim;
  closeModal();
  toast('Horário atualizado!', 'success');
  go('disponibilidade');
}

function toggleDisponibilidade(id) {
  const d = DISPONIBILIDADE.find(x => x.id === id);
  if (!d) return;
  d.ativo = !d.ativo;
  toast(`Horário ${d.ativo ? 'ativado' : 'desativado'}.`);
  go('disponibilidade');
}

function removerDisponibilidade(id) {
  const idx = DISPONIBILIDADE.findIndex(x => x.id === id);
  if (idx < 0) return;
  DISPONIBILIDADE.splice(idx, 1);
  toast('Horário removido.');
  go('disponibilidade');
}

function renderBloqueios() {
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = `<button class="btn btn-accent btn-sm" onclick="openNovoBloqueio()">+ Novo bloqueio</button>`;

  const tipos = { manual: ['badge-solicitado','Manual'], feriado: ['badge-cancelado','Feriado'], ferias: ['badge-pendente','Férias'], intervalo: ['badge-concluido','Intervalo'] };

  const sorted = [...BLOQUEIOS].sort((a,b) => a.data_inicio.localeCompare(b.data_inicio));

  document.getElementById('page-content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
      <div class="kpi-card">
        <div class="kpi-label">Feriados cadastrados</div>
        <div class="kpi-value">${BLOQUEIOS.filter(b=>b.tipo==='feriado').length}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Períodos de férias</div>
        <div class="kpi-value">${BLOQUEIOS.filter(b=>b.tipo==='ferias').length}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Bloqueios manuais</div>
        <div class="kpi-value">${BLOQUEIOS.filter(b=>b.tipo==='manual').length}</div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Tipo</th>
            <th>Colaborador</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Motivo</th>
            <th></th>
          </tr></thead>
          <tbody>
            ${sorted.map(b => {
              const [cls, label] = tipos[b.tipo] || ['badge-pendente', b.tipo];
              const usr = b.usuario_id ? getUsuario(b.usuario_id).nome : 'Todos';
              const isGlobal = !b.usuario_id;
              const inicio = new Date(b.data_inicio);
              const fim    = new Date(b.data_fim);
              const isAllDay = inicio.getHours() === 0 && fim.getHours() === 23;
              return `<tr>
                <td><span class="badge ${cls}">${label}</span>${isGlobal ? ' <span class="chip" style="font-size:10px">Global</span>' : ''}</td>
                <td>${isGlobal ? '<span class="text-muted">Escritório inteiro</span>' : usr}</td>
                <td><span style="font-family:var(--mono);font-size:13px">${isAllDay ? fmtDate(b.data_inicio.slice(0,10)) : fmtDateTime(b.data_inicio)}</span></td>
                <td><span style="font-family:var(--mono);font-size:13px">${isAllDay ? fmtDate(b.data_fim.slice(0,10)) : fmtDateTime(b.data_fim)}</span></td>
                <td>${b.motivo || '—'}</td>
                <td>
                  <button class="btn btn-ghost btn-sm" onclick="editBloqueio(${b.id})">Editar</button>
                  <button class="btn btn-danger btn-sm" onclick="removerBloqueio(${b.id})">Remover</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${BLOQUEIOS.length === 0 ? '<div class="empty-state"><h3>Nenhum bloqueio cadastrado</h3><p>Adicione feriados, férias ou bloqueios pontuais.</p></div>' : ''}
      </div>
    </div>`;
}

function openNovoBloqueio() {
  document.getElementById('modal-title').textContent = 'Novo Bloqueio';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-field full">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="nb-tipo" onchange="toggleBloqueioTipo()">
          <option value="feriado">Feriado (dia inteiro — escritório fechado)</option>
          <option value="ferias">Férias (período — colaborador específico)</option>
          <option value="manual">Manual (horário específico)</option>
        </select>
      </div>
      <div class="form-field full" id="nb-usuario-wrap">
        <label class="form-label">Colaborador <span class="text-muted">(deixe em branco para bloquear todos)</span></label>
        <select class="form-select" id="nb-usuario">
          <option value="">— Todos (escritório inteiro) —</option>
          ${USUARIOS.filter(u=>u.ativo).map(u=>`<option value="${u.id}">${u.nome}</option>`).join('')}
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Data início</label>
        <input type="date" class="form-input" id="nb-dini" value="${getRelDay(7)}">
      </div>
      <div class="form-field">
        <label class="form-label">Data fim</label>
        <input type="date" class="form-input" id="nb-dfim" value="${getRelDay(7)}">
      </div>
      <div class="form-field" id="nb-hini-wrap" style="display:none">
        <label class="form-label">Hora início</label>
        <input type="time" class="form-input" id="nb-hini" value="13:00">
      </div>
      <div class="form-field" id="nb-hfim-wrap" style="display:none">
        <label class="form-label">Hora fim</label>
        <input type="time" class="form-input" id="nb-hfim" value="15:00">
      </div>
      <div class="form-field full">
        <label class="form-label">Motivo / Descrição</label>
        <input type="text" class="form-input" id="nb-motivo" placeholder="Ex: Feriado Municipal — Aniversário da cidade">
      </div>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-accent" onclick="salvarBloqueio()">Salvar bloqueio</button>`;
  openModal();
  toggleBloqueioTipo();
}

function toggleBloqueioTipo() {
  const tipo = document.getElementById('nb-tipo').value;
  const isManual = tipo === 'manual';
  document.getElementById('nb-hini-wrap').style.display = isManual ? '' : 'none';
  document.getElementById('nb-hfim-wrap').style.display = isManual ? '' : 'none';
  // Feriado sempre global
  if (tipo === 'feriado') {
    document.getElementById('nb-usuario').value = '';
    document.getElementById('nb-usuario-wrap').style.opacity = '0.4';
    document.getElementById('nb-usuario-wrap').style.pointerEvents = 'none';
  } else {
    document.getElementById('nb-usuario-wrap').style.opacity = '';
    document.getElementById('nb-usuario-wrap').style.pointerEvents = '';
  }
}

function salvarBloqueio() {
  const tipo   = document.getElementById('nb-tipo').value;
  const uid    = document.getElementById('nb-usuario').value ? parseInt(document.getElementById('nb-usuario').value) : null;
  const dini   = document.getElementById('nb-dini').value;
  const dfim   = document.getElementById('nb-dfim').value;
  const hini   = tipo === 'manual' ? document.getElementById('nb-hini').value : '00:00';
  const hfim   = tipo === 'manual' ? document.getElementById('nb-hfim').value : '23:59';
  const motivo = document.getElementById('nb-motivo').value.trim();
  if (!dini || !dfim) { toast('Informe as datas.', 'error'); return; }
  BLOQUEIOS.push({ id: ++nextId, tenant_id: 1, usuario_id: uid, tipo, data_inicio: dini+'T'+hini+':00', data_fim: dfim+'T'+hfim+':00', recorrente: false, motivo });
  closeModal();
  toast('Bloqueio cadastrado!', 'success');
  go('bloqueios');
}

function editBloqueio(id) {
  const b = BLOQUEIOS.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modal-title').textContent = 'Editar Bloqueio';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-field full">
        <label class="form-label">Motivo</label>
        <input type="text" class="form-input" id="eb-motivo" value="${b.motivo}">
      </div>
      <div class="form-field">
        <label class="form-label">Data início</label>
        <input type="date" class="form-input" id="eb-dini" value="${b.data_inicio.slice(0,10)}">
      </div>
      <div class="form-field">
        <label class="form-label">Data fim</label>
        <input type="date" class="form-input" id="eb-dfim" value="${b.data_fim.slice(0,10)}">
      </div>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-accent" onclick="salvarEditBloqueio(${id})">Salvar</button>`;
  openModal();
}

function salvarEditBloqueio(id) {
  const b = BLOQUEIOS.find(x => x.id === id);
  if (!b) return;
  b.motivo = document.getElementById('eb-motivo').value;
  const nd = document.getElementById('eb-dini').value;
  const nf = document.getElementById('eb-dfim').value;
  if (nd) b.data_inicio = nd + b.data_inicio.slice(10);
  if (nf) b.data_fim    = nf + b.data_fim.slice(10);
  closeModal();
  toast('Bloqueio atualizado!', 'success');
  go('bloqueios');
}

function removerBloqueio(id) {
  if (!confirm('Remover este bloqueio?')) return;
  const idx = BLOQUEIOS.findIndex(x => x.id === id);
  if (idx >= 0) BLOQUEIOS.splice(idx, 1);
  toast('Bloqueio removido.');
  go('bloqueios');
}

// PAGE: CONFIGURAÇÕES

function renderConfiguracoes() {
  document.getElementById('topbar-actions').innerHTML = '';

  const categorias = ['operacional','notificacao','integracao','aparencia'];
  const catLabel   = { operacional:'Operacional', notificacao:'Notificações', integracao:'Integração', aparencia:'Aparência' };
  const catIcon    = { operacional:'⚙️', notificacao:'🔔', integracao:'🔗', aparencia:'🎨' };

  let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">`;

  categorias.forEach(cat => {
    const cfgs = CONFIG.filter(c => c.categoria === cat);
    html += `<div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">${catIcon[cat]} ${catLabel[cat]}</div>
      ${cfgs.map(c => `
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
            <label class="form-label" style="margin:0">${c.chave}</label>
            <span class="text-muted">${c.descricao}</span>
          </div>
          ${renderConfigInput(c)}
        </div>`).join('')}
      <button class="btn btn-accent btn-sm" style="width:100%;margin-top:4px" onclick="salvarConfig('${cat}')">Salvar ${catLabel[cat]}</button>
    </div>`;
  });

  html += `</div>

  <div class="card" style="margin-top:20px">
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">🗄️ Banco de Dados</div>
    <div class="text-muted" style="margin-bottom:16px">Status da integração com Supabase (disponível após migração do mock)</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="padding:12px 16px;border:1px solid var(--border);border-radius:8px;flex:1;min-width:180px">
        <div class="text-muted">Projeto Supabase</div>
        <div style="font-weight:600;font-family:var(--mono);font-size:13px;margin-top:4px">— não configurado —</div>
      </div>
      <div style="padding:12px 16px;border:1px solid var(--border);border-radius:8px;flex:1;min-width:180px">
        <div class="text-muted">Modo atual</div>
        <div style="font-weight:600;color:var(--amber);margin-top:4px">Mock (dados locais)</div>
      </div>
      <div style="padding:12px 16px;border:1px solid var(--border);border-radius:8px;flex:1;min-width:180px">
        <div class="text-muted">Tenant ID</div>
        <div style="font-weight:600;font-family:var(--mono);font-size:13px;margin-top:4px">${TENANT.id}</div>
      </div>
    </div>
  </div>`;

  document.getElementById('page-content').innerHTML = html;
}

function renderConfigInput(c) {
  if (c.valor === 'true' || c.valor === 'false') {
    return `<div style="display:flex;align-items:center;gap:10px">
      <label style="position:relative;display:inline-block;width:44px;height:22px">
        <input type="checkbox" id="cfg-${c.chave}" ${c.valor==='true'?'checked':''} style="opacity:0;width:0;height:0" onchange="updateConfigToggle('${c.chave}',this.checked)">
        <span style="position:absolute;inset:0;background:${c.valor==='true'?'var(--accent)':'var(--border)'};border-radius:22px;transition:.2s;cursor:pointer"></span>
        <span style="position:absolute;top:3px;left:${c.valor==='true'?'25px':'3px'};width:16px;height:16px;background:#fff;border-radius:50%;transition:.2s"></span>
      </label>
      <span style="font-size:13px;color:var(--text-2)">${c.valor==='true'?'Ativado':'Desativado'}</span>
    </div>`;
  }
  return `<input type="${isNaN(c.valor)||c.valor===''?'text':'number'}" class="form-input" id="cfg-${c.chave}" value="${c.valor}" placeholder="${c.descricao}">`;
}

function updateConfigToggle(chave, checked) {
  const c = CONFIG.find(x => x.chave === chave);
  if (c) c.valor = checked ? 'true' : 'false';
  // Re-render input label
  renderConfiguracoes();
}

function salvarConfig(cat) {
  const cfgs = CONFIG.filter(c => c.categoria === cat);
  cfgs.forEach(c => {
    const el = document.getElementById('cfg-' + c.chave);
    if (!el) return;
    if (el.type === 'checkbox') { c.valor = el.checked ? 'true' : 'false'; }
    else { c.valor = el.value; }
  });
  toast('Configurações salvas!', 'success');
}
